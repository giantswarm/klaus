---
# yamllint disable rule:truthy
name: CI Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  check:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify Dockerfile.debian is in sync
        run: |
          make generate-dockerfile-debian
          git diff --exit-code Dockerfile.debian

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install Python for yamllint
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: pip install yamllint

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: 'v3.21.2'

      - name: Install helm-unittest plugin
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest.git

      - name: Run Checks (Lint & Test)
        run: make check

      - name: Run Helm linter
        run: make helm-lint

      - name: Run Helm unit tests
        run: make helm-test

      - name: Run govulncheck (Security Scan)
        run: make govulncheck

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: latest
          install-only: true

      - name: Run Release Dry-Run
        if: github.event_name == 'pull_request'
        run: make release-dry-run-fast
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
