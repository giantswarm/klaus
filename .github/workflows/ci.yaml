---
# yamllint disable rule:truthy
name: CI Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  check:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify Dockerfile.debian is in sync
        run: |
          make generate-dockerfile-debian
          git diff --exit-code Dockerfile.debian

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install Python for yamllint
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: pip install yamllint

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: 'v3.21.1'

      - name: Install helm-unittest plugin
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest.git

      - name: Run Checks (Lint & Test)
        run: make check

      - name: Run Helm linter
        run: make helm-lint

      - name: Run Helm unit tests
        run: make helm-test

      - name: Run govulncheck (Security Scan)
        run: make govulncheck

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: latest
          install-only: true

      - name: Run Release Dry-Run
        if: github.event_name == 'pull_request'
        run: make release-dry-run-fast
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
