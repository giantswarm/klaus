---
# yamllint disable rule:truthy
name: Auto Release
on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  auto_release:
    name: Auto Release
    if: >-
      github.event.pull_request.merged &&
      !startsWith(github.event.pull_request.title, 'Release v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: --version

      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Determine Next Version
        id: version
        run: |
          set -e
          # Use version-aware sorting to find the semantically highest tag,
          # not just the nearest reachable one. git describe can pick the
          # wrong tag when multiple tags point to the same commit.
          LATEST_TAG=$(git tag --sort=-version:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          # Remove 'v' prefix
          LATEST_VERSION=${LATEST_TAG#v}
          # Split into major, minor, patch
          IFS='.' read -r -a VERSION_PARTS <<< "$LATEST_VERSION"
          # Increment patch version
          NEXT_PATCH=$((VERSION_PARTS[2] + 1))
          # Construct next version string
          NEXT_VERSION="v${VERSION_PARTS[0]}.${VERSION_PARTS[1]}.$NEXT_PATCH"
          echo "Latest tag: $LATEST_TAG"
          echo "Next version: $NEXT_VERSION"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Tag
        run: |
          NEXT_VERSION="${{ steps.version.outputs.next_version }}"
          git tag "$NEXT_VERSION"
          git push origin "$NEXT_VERSION"
          echo "Created and pushed tag $NEXT_VERSION"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify downstream repos
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.DOWNSTREAM_DISPATCH_TOKEN }}
          RELEASE_VERSION: ${{ steps.version.outputs.next_version }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::DOWNSTREAM_DISPATCH_TOKEN is not set, skipping downstream notification"
            exit 0
          fi

          DOWNSTREAM_REPOS=(
            "giantswarm/klaus-toolchains"
            "giantswarm/klaus-toolchains-internal"
          )
          FAILED=0
          for repo in "${DOWNSTREAM_REPOS[@]}"; do
            echo "Sending repository_dispatch to $repo (version: $RELEASE_VERSION)"
            if gh api \
              --method POST \
              "/repos/${repo}/dispatches" \
              -f "event_type=klaus-release" \
              -f "client_payload[version]=${RELEASE_VERSION}"; then
              echo "  -> Notified $repo"
            else
              echo "::warning::Failed to notify $repo" >&2
              FAILED=1
            fi
          done
          exit $FAILED
