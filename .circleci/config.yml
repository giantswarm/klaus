version: 2.1
orbs:
  architect: giantswarm/architect@6.14.1

jobs:
  notify-downstream:
    docker:
    - image: cimg/base:2025.12
    steps:
    - run:
        name: Notify downstream repos of new release
        command: |
          VERSION="${CIRCLE_TAG}"
          if [ -z "$VERSION" ]; then
            echo "CIRCLE_TAG is empty -- aborting" >&2
            exit 1
          fi
          if [ -z "$DOWNSTREAM_DISPATCH_TOKEN" ]; then
            echo "DOWNSTREAM_DISPATCH_TOKEN not set -- skipping"
            exit 0
          fi

          PAYLOAD=$(jq -cn --arg v "$VERSION" \
            '{"event_type":"klaus-release","client_payload":{"version":$v}}')

          DOWNSTREAM_REPOS=(
            "giantswarm/klaus-toolchains"
            "giantswarm/klaus-toolchains-internal"
          )
          FAILED=0
          for repo in "${DOWNSTREAM_REPOS[@]}"; do
            echo "Dispatching to $repo ($VERSION)"
            HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${DOWNSTREAM_DISPATCH_TOKEN}" \
              "https://api.github.com/repos/${repo}/dispatches" \
              -d "$PAYLOAD")
            if [ "$HTTP_CODE" = "204" ]; then
              echo "  -> Notified $repo"
            else
              echo "  -> Failed to notify $repo (HTTP $HTTP_CODE)" >&2
              FAILED=1
            fi
          done
          exit $FAILED

workflows:
  build:
    jobs:
    - architect/go-build:
        name: go-build-klaus
        binary: klaus
        filters:
          tags:
            only: /^v.*/

    # Branch builds: amd64 only for faster PR feedback
    - architect/push-to-registries-multiarch:
        context: architect
        name: push-to-registries
        platforms: "linux/amd64"
        resource_class: medium
        requires:
        - go-build-klaus
        filters:
          branches:
            ignore:
            - main

    - architect/push-to-registries-multiarch:
        context: architect
        name: push-to-registries-debian
        image: giantswarm/klaus-debian
        dockerfile: ./Dockerfile.debian
        platforms: "linux/amd64"
        resource_class: medium
        requires:
        - go-build-klaus
        filters:
          branches:
            ignore:
            - main

    # Branch builds: publish to klaus-toolchains namespace
    - architect/push-to-registries-multiarch:
        context: architect
        name: push-to-toolchains
        image: giantswarm/klaus-toolchains/base
        platforms: "linux/amd64"
        resource_class: medium
        requires:
        - go-build-klaus
        filters:
          branches:
            ignore:
            - main

    - architect/push-to-registries-multiarch:
        context: architect
        name: push-to-toolchains-debian
        image: giantswarm/klaus-toolchains/base-debian
        dockerfile: ./Dockerfile.debian
        platforms: "linux/amd64"
        resource_class: medium
        requires:
        - go-build-klaus
        filters:
          branches:
            ignore:
            - main

    # Tag builds: full multi-arch (amd64 + arm64)
    - architect/push-to-registries-multiarch:
        context: architect
        name: push-to-registries-release
        requires:
        - go-build-klaus
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    - architect/push-to-registries-multiarch:
        context: architect
        name: push-to-registries-debian-release
        image: giantswarm/klaus-debian
        dockerfile: ./Dockerfile.debian
        requires:
        - go-build-klaus
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    # Tag builds: publish to klaus-toolchains namespace
    - architect/push-to-registries-multiarch:
        context: architect
        name: push-to-toolchains-release
        image: giantswarm/klaus-toolchains/base
        requires:
        - go-build-klaus
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    - architect/push-to-registries-multiarch:
        context: architect
        name: push-to-toolchains-debian-release
        image: giantswarm/klaus-toolchains/base-debian
        dockerfile: ./Dockerfile.debian
        requires:
        - go-build-klaus
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    # Tag builds: notify downstream after all images are pushed
    - notify-downstream:
        context: architect
        requires:
        - push-to-registries-release
        - push-to-registries-debian-release
        - push-to-toolchains-release
        - push-to-toolchains-debian-release
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    - architect/push-to-app-catalog:
        executor: app-build-suite
        context: architect
        name: build-klaus-chart
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: klaus
        push_to_appcatalog: false
        push_to_oci_registry: false
        persist_chart_archive: true
        requires:
        - go-build-klaus
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main

    - architect/run-tests-with-ats:
        name: execute chart tests
        requires:
        - build-klaus-chart
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main

    # Branch: push chart after tests + amd64 images
    - architect/push-to-app-catalog:
        executor: app-build-suite
        context: architect
        name: push-klaus-to-giantswarm-app-catalog
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: klaus
        requires:
        - execute chart tests
        - push-to-registries
        - push-to-registries-debian
        - push-to-toolchains
        - push-to-toolchains-debian
        filters:
          branches:
            ignore:
            - main

    # Tag: push chart after tests + multi-arch images
    - architect/push-to-app-catalog:
        executor: app-build-suite
        context: architect
        name: push-klaus-to-giantswarm-app-catalog-release
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: klaus
        requires:
        - execute chart tests
        - push-to-registries-release
        - push-to-registries-debian-release
        - push-to-toolchains-release
        - push-to-toolchains-debian-release
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/
